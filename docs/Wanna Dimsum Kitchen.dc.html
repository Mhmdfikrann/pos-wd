<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #FFF9F2; color: #2D2022; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.006em; overflow: hidden; }
  a { color: #A91F34; text-decoration: none; }
  a:hover { color: #7F1628; }
  ::selection { background: #FFD84D; color: #2D2022; }
  @keyframes wd-blink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @keyframes wd-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes wd-flash { 0%,100% { box-shadow: 0 0 0 0 rgba(214,69,69,0); } 50% { box-shadow: 0 0 0 4px rgba(214,69,69,0.28); } }
  .wd-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .wd-scroll::-webkit-scrollbar-thumb { background: rgba(45,32,34,0.16); border-radius: 8px; }
  .wd-scroll::-webkit-scrollbar-track { background: transparent; }
</style>
</helmet>

<div data-screen-label="Kitchen Display" style="height:100vh;display:flex;flex-direction:column;background:#FFF9F2;">

  <!-- ===== HEADER ===== -->
  <div style="height:64px;flex-shrink:0;display:flex;align-items:center;gap:16px;padding:0 20px;background:#fff;border-bottom:1px solid rgba(45,32,34,0.08);">
    <div style="display:flex;align-items:center;gap:11px;flex-shrink:0;">
      <div style="width:40px;height:40px;border-radius:9px;background:#fff;border:1px solid rgba(45,32,34,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <img src="assets/logo-icon.jpg" alt="Wanna Dimsum" style="width:36px;height:36px;object-fit:contain;" />
      </div>
      <div style="line-height:1.05;">
        <div style="font-size:13.5px;font-weight:800;"><span style="color:#A91F34;">WANNA</span> DIMSUM</div>
        <div style="font-size:10.5px;color:rgba(45,32,34,0.5);font-weight:600;margin-top:2px;">Kitchen Display · {{ outletName }}</div>
      </div>
    </div>

    <div style="width:1px;height:28px;background:rgba(45,32,34,0.1);margin-left:6px;"></div>
    {{ stationTabs }}

    <div style="flex:1;"></div>

    <span style="display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;padding:8px 13px;border-radius:9px;background:#FFF4D6;color:#A9791F;font-family:'JetBrains Mono',monospace;">{{ icClock }}{{ clock }}</span>
    <span style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:9px;background:#E4F4EC;color:#238152;"><span style="width:8px;height:8px;border-radius:50%;background:#2E9D64;animation:wd-blink 1.6s infinite;"></span>Online</span>
    <div style="width:1px;height:28px;background:rgba(45,32,34,0.1);"></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:38px;height:38px;border-radius:50%;background:#FFF4D6;color:#A9791F;border:1px solid rgba(169,121,31,0.3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;">{{ staffInitial }}</div>
      <div style="line-height:1.15;">
        <div style="font-size:12.5px;font-weight:700;">{{ staffName }}</div>
        <div style="font-size:10.5px;color:rgba(45,32,34,0.5);">Dapur · Shift Siang</div>
      </div>
    </div>
  </div>

  <!-- ===== BOARD ===== -->
  <div style="flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:minmax(0,1fr);gap:0;min-height:0;overflow:hidden;">
    {{ columns }}
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1360,&quot;height&quot;:900},&quot;outletName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Outlet Kemang&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;staffName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Rian Pratama&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;warnMinutes&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:5,&quot;min&quot;:1,&quot;max&quot;:15,&quot;step&quot;:1,&quot;unit&quot;:&quot;m&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Timer&quot;},&quot;alertMinutes&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:10,&quot;min&quot;:2,&quot;max&quot;:30,&quot;step&quot;:1,&quot;unit&quot;:&quot;m&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Timer&quot;}}">
class Component extends DCLogic {
  state = {
    tick: 0,
    station: 'all',
    tickets: [
      { id: 't1', no: '0431', type: 'dinein', slot: 'Meja A-12', base: 40, status: 'baru', items: [
        { name: 'Dimsum Ayam', qty: 3, note: 'Sambal pisah', station: 'kukus', done: false },
        { name: 'Hakau Udang', qty: 2, note: '', station: 'kukus', done: false },
        { name: 'Es Teh Melati', qty: 3, note: 'Less sugar', station: 'minuman', done: false },
      ] },
      { id: 't2', no: '0430', type: 'gofood', slot: 'GoFood', base: 95, status: 'baru', items: [
        { name: 'Paket Hemat A', qty: 1, note: '', station: 'kukus', done: false },
        { name: 'Lumpia Udang', qty: 2, note: 'Extra crispy', station: 'goreng', done: false },
      ] },
      { id: 't3', no: '0429', type: 'takeaway', slot: 'Antrean T-07', base: 260, status: 'proses', items: [
        { name: 'Siomay Ayam', qty: 4, note: '', station: 'kukus', done: true },
        { name: 'Pangsit Goreng', qty: 3, note: 'Saus asam manis', station: 'goreng', done: false },
        { name: 'Teh Tarik', qty: 2, note: '', station: 'minuman', done: false },
      ] },
      { id: 't4', no: '0428', type: 'dinein', slot: 'Meja B-03', base: 430, status: 'proses', items: [
        { name: 'Xiao Long Bao', qty: 2, note: 'Hati-hati panas', station: 'kukus', done: true },
        { name: 'Ceker Dimsum', qty: 1, note: '', station: 'kukus', done: true },
        { name: 'Es Jeruk', qty: 2, note: '', station: 'minuman', done: false },
      ] },
      { id: 't5', no: '0427', type: 'grab', slot: 'GrabFood', base: 640, status: 'proses', items: [
        { name: 'Paket Keluarga', qty: 1, note: '', station: 'kukus', done: false },
        { name: 'Lumpia Kulit Tahu', qty: 2, note: '', station: 'goreng', done: false },
      ] },
      { id: 't6', no: '0426', type: 'dinein', slot: 'Meja A-05', base: 180, status: 'siap', items: [
        { name: 'Dimsum Ayam Keju', qty: 2, note: '', station: 'kukus', done: true },
        { name: 'Air Mineral', qty: 2, note: '', station: 'minuman', done: true },
      ] },
      { id: 't7', no: '0425', type: 'takeaway', slot: 'Antrean T-05', base: 300, status: 'siap', items: [
        { name: 'Mantao Kukus', qty: 3, note: '', station: 'kukus', done: true },
        { name: 'Pangsit Goreng', qty: 2, note: '', station: 'goreng', done: true },
      ] },
    ],
  };

  STATIONS = [['all', 'Semua'], ['kukus', 'Kukus'], ['goreng', 'Goreng'], ['minuman', 'Minuman']];
  COLS = [
    { key: 'baru', label: 'Baru', color: '#3A5BB0', bg: '#EEF2FB' },
    { key: 'proses', label: 'Sedang Dimasak', color: '#C67A15', bg: '#FCEEDB' },
    { key: 'siap', label: 'Siap Antar', color: '#238152', bg: '#E4F4EC' },
  ];
  TYPE = {
    dinein: ['Dine-in', '#A91F34', '#FFF1F2'],
    takeaway: ['Takeaway', '#C67A15', '#FCEEDB'],
    gofood: ['GoFood', '#238152', '#E4F4EC'],
    grab: ['GrabFood', '#3A5BB0', '#EEF2FB'],
  };

  ICONS = {
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    check: '<path d="M20 6 9 17l-5-5"/>',
    play: '<polygon points="6 3 20 12 6 21 6 3"/>',
    bell: '<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
    back: '<path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/>',
    flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
  };
  ic(name, size, color, sw) {
    return React.createElement('svg', { width: size || 18, height: size || 18, viewBox: '0 0 24 24', fill: 'none', stroke: color || 'currentColor', strokeWidth: sw || 2, strokeLinecap: 'round', strokeLinejoin: 'round', dangerouslySetInnerHTML: { __html: this.ICONS[name] || '' } });
  }

  componentDidMount() { this.timer = setInterval(() => this.setState(s => ({ tick: s.tick + 1 })), 1000); }
  componentWillUnmount() { clearInterval(this.timer); }

  get warnSec() { return (this.props.warnMinutes ?? 5) * 60; }
  get alertSec() { return (this.props.alertMinutes ?? 10) * 60; }
  elapsed(t) { return t.base + this.state.tick; }
  mmss(s) { const m = Math.floor(s / 60), sec = s % 60; return m + ':' + String(sec).padStart(2, '0'); }
  ageColor(s) { if (s >= this.alertSec) return '#D64545'; if (s >= this.warnSec) return '#E99A22'; return '#238152'; }

  bump(id) {
    const order = ['baru', 'proses', 'siap'];
    this.setState(s => ({
      tickets: s.tickets.reduce((acc, t) => {
        if (t.id !== id) { acc.push(t); return acc; }
        const i = order.indexOf(t.status);
        if (i >= order.length - 1) return acc; // remove from board
        acc.push({ ...t, base: t.base, status: order[i + 1], items: order[i + 1] === 'siap' ? t.items.map(it => ({ ...it, done: true })) : t.items });
        return acc;
      }, []),
    }));
  }
  recall(id) {
    const order = ['baru', 'proses', 'siap'];
    this.setState(s => ({ tickets: s.tickets.map(t => t.id === id ? { ...t, status: order[Math.max(0, order.indexOf(t.status) - 1)] } : t) }));
  }
  toggleItem(id, idx) {
    this.setState(s => ({ tickets: s.tickets.map(t => t.id === id ? { ...t, items: t.items.map((it, i) => i === idx ? { ...it, done: !it.done } : it) } : t) }));
  }

  visibleTickets() {
    const st = this.state.station;
    return this.state.tickets.filter(t => st === 'all' || t.items.some(i => i.station === st));
  }

  renderStationTabs() {
    const h = React.createElement;
    return h('div', { style: { display: 'flex', gap: '4px', background: '#FFF9F2', padding: '4px', borderRadius: '10px', border: '1px solid rgba(45,32,34,0.08)' } },
      this.STATIONS.map(([key, label]) => {
        const on = this.state.station === key;
        return h('button', { key, onClick: () => this.setState({ station: key }), style: { border: 'none', cursor: 'pointer', borderRadius: '7px', fontFamily: 'inherit', fontSize: '13px', fontWeight: 700, padding: '8px 15px', background: on ? '#A91F34' : 'transparent', color: on ? '#fff' : 'rgba(45,32,34,0.6)', transition: 'all .12s' } }, label);
      }));
  }

  renderTicket(t) {
    const h = React.createElement;
    const [tLabel, tColor, tBg] = this.TYPE[t.type];
    const sec = this.elapsed(t);
    const ageC = this.ageColor(sec);
    const overdue = sec >= this.alertSec && t.status !== 'siap';
    const doneCount = t.items.filter(i => i.done).length;
    const allDone = doneCount === t.items.length;

    const actionMap = {
      baru: ['Mulai Masak', 'play', '#3A5BB0'],
      proses: [allDone ? 'Tandai Siap' : 'Selesai Masak', 'check', '#238152'],
      siap: ['Sudah Diantar', 'bell', '#A91F34'],
    };
    const [aLabel, aIcon, aColor] = actionMap[t.status];

    return h('div', {
      key: t.id,
      style: { flexShrink: 0, background: '#fff', border: '1px solid ' + (overdue ? 'rgba(214,69,69,0.5)' : 'rgba(45,32,34,0.1)'), borderRadius: '13px', overflow: 'hidden', boxShadow: '0 8px 22px -18px rgba(45,32,34,0.5)', animation: overdue ? 'wd-flash 1.4s infinite' : 'wd-fade .25s ease' },
    },
      // header
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 14px', borderBottom: '1px dashed rgba(45,32,34,0.12)' } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
          h('span', { style: { fontFamily: "'JetBrains Mono',monospace", fontSize: '15px', fontWeight: 700 } }, '#' + t.no),
          h('span', { style: { fontSize: '11px', fontWeight: 700, padding: '3px 8px', borderRadius: '6px', background: tBg, color: tColor } }, tLabel),
        ),
        h('div', { style: { display: 'inline-flex', alignItems: 'center', gap: '5px', fontFamily: "'JetBrains Mono',monospace", fontSize: '14px', fontWeight: 700, color: ageC } }, this.ic('clock', 14, ageC, 2.2), this.mmss(sec)),
      ),
      // slot + progress
      h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '9px 14px 4px' } },
        h('span', { style: { fontSize: '13px', fontWeight: 700, color: '#A91F34' } }, t.slot),
        h('span', { style: { fontFamily: "'JetBrains Mono',monospace", fontSize: '11.5px', color: 'rgba(45,32,34,0.5)' } }, doneCount + '/' + t.items.length + ' siap'),
      ),
      // items
      h('div', { className: 'wd-scroll', style: { padding: '4px 14px 10px', display: 'flex', flexDirection: 'column', gap: '2px', maxHeight: '220px', overflowY: 'auto' } },
        t.items.map((it, idx) => {
          const dim = this.state.station !== 'all' && it.station !== this.state.station;
          return h('div', { key: idx, onClick: () => this.toggleItem(t.id, idx), style: { display: 'flex', gap: '10px', padding: '8px 6px', borderRadius: '8px', cursor: 'pointer', opacity: dim ? 0.4 : 1, background: it.done ? '#FFF9F2' : 'transparent' } },
            h('div', { style: { width: '22px', height: '22px', flexShrink: 0, borderRadius: '6px', marginTop: '1px', border: it.done ? 'none' : '1.5px solid rgba(45,32,34,0.22)', background: it.done ? '#2E9D64' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, it.done ? this.ic('check', 14, '#fff', 3) : null),
            h('div', { style: { flex: 1, minWidth: 0 } },
              h('div', { style: { display: 'flex', gap: '8px', alignItems: 'baseline' } },
                h('span', { style: { fontFamily: "'JetBrains Mono',monospace", fontSize: '15px', fontWeight: 700, color: '#A91F34', minWidth: '26px' } }, it.qty + '\u00D7'),
                h('span', { style: { fontSize: '15px', fontWeight: 700, textDecoration: it.done ? 'line-through' : 'none', color: it.done ? 'rgba(45,32,34,0.45)' : '#2D2022' } }, it.name),
              ),
              it.note ? h('div', { style: { fontSize: '12px', color: '#C67A15', fontWeight: 600, marginTop: '2px', marginLeft: '34px' } }, '\u270E ' + it.note) : null,
            ),
          );
        }),
      ),
      // action
      h('div', { style: { display: 'flex', gap: '8px', padding: '0 12px 12px' } },
        t.status !== 'baru' ? h('button', { onClick: () => this.recall(t.id), 'aria-label': 'Kembalikan', style: { width: '46px', flexShrink: 0, height: '46px', borderRadius: '10px', border: '1.5px solid rgba(45,32,34,0.15)', background: '#fff', color: 'rgba(45,32,34,0.55)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, this.ic('back', 18, 'currentColor', 2)) : null,
        h('button', { onClick: () => this.bump(t.id), style: { flex: 1, height: '46px', borderRadius: '10px', border: 'none', background: aColor, color: '#fff', fontFamily: 'inherit', fontWeight: 800, fontSize: '14.5px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', boxShadow: '0 10px 20px -12px ' + aColor } }, this.ic(aIcon, 17, '#fff', 2.2), aLabel),
      ),
    );
  }

  renderColumns() {
    const h = React.createElement;
    const tickets = this.visibleTickets();
    return h(React.Fragment, {}, this.COLS.map((col, ci) => {
      const list = tickets.filter(t => t.status === col.key).sort((a, b) => this.elapsed(b) - this.elapsed(a));
      return h('div', { key: col.key, style: { display: 'flex', flexDirection: 'column', minHeight: 0, borderRight: ci < 2 ? '1px solid rgba(45,32,34,0.08)' : 'none' } },
        h('div', { style: { flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px', background: col.bg } },
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '9px' } },
            h('span', { style: { width: '10px', height: '10px', borderRadius: '50%', background: col.color } }),
            h('span', { style: { fontSize: '15px', fontWeight: 800, color: col.color } }, col.label),
          ),
          h('span', { style: { fontFamily: "'JetBrains Mono',monospace", fontSize: '13px', fontWeight: 700, color: '#fff', background: col.color, minWidth: '26px', height: '24px', padding: '0 8px', borderRadius: '999px', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, list.length),
        ),
        h('div', { className: 'wd-scroll', style: { flex: 1, overflowY: 'auto', padding: '14px', display: 'flex', flexDirection: 'column', gap: '13px' } },
          list.length === 0
            ? h('div', { style: { textAlign: 'center', padding: '50px 16px', color: 'rgba(45,32,34,0.4)', fontSize: '13.5px', fontWeight: 600 } }, 'Tidak ada pesanan')
            : list.map(t => this.renderTicket(t)),
        ),
      );
    }));
  }

  renderVals() {
    const now = new Date();
    return {
      outletName: this.props.outletName ?? 'Outlet Kemang',
      staffName: this.props.staffName ?? 'Rian Pratama',
      staffInitial: (this.props.staffName ?? 'Rian Pratama').charAt(0),
      icClock: this.ic('clock', 15, 'currentColor', 2),
      clock: String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0'),
      stationTabs: this.renderStationTabs(),
      columns: this.renderColumns(),
    };
  }
}
</script>
</body>
</html>
